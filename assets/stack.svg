<svg width="860" height="390" viewBox="0 0 860 390" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="1" stop-color="#080e18"/>
    </linearGradient>
    <clipPath id="sc"><rect width="860" height="390" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#sc)">
    <rect width="860" height="390" fill="url(#bg)"/>

    <text x="430" y="34" text-anchor="middle" font-size="11" letter-spacing="4" fill="#3a4d59" font-family="'Courier New', monospace">SYSTEM ARCHITECTURE — LAYER BY LAYER</text>

    <!-- Layer 1 -->
    <rect x="24" y="52" width="812" height="72" rx="8" fill="#0d2620" stroke="#00ffc8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="42" y="76" font-size="11" font-weight="700" fill="#00ffc8" font-family="'Courier New', monospace" letter-spacing="1">01 · INTERFACE &amp; FRONTEND</text>
    <text x="42" y="102" font-size="13" fill="#cfe3df" font-family="'Helvetica Neue', Arial, sans-serif">React  ·  Next.js  ·  Streamlit  ·  Gradio  ·  Tailwind CSS  ·  FastAPI REST</text>
    <circle cx="822" cy="88" r="4" fill="#00ffc8"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>

    <!-- Layer 2 -->
    <rect x="24" y="138" width="812" height="72" rx="8" fill="#0d1e2e" stroke="#3da9fc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="42" y="162" font-size="11" font-weight="700" fill="#3da9fc" font-family="'Courier New', monospace" letter-spacing="1">02 · ORCHESTRATION &amp; AGENTS</text>
    <text x="42" y="188" font-size="13" fill="#cfe3df" font-family="'Helvetica Neue', Arial, sans-serif">LangChain  ·  LangGraph  ·  CrewAI  ·  FastMCP  ·  Async Workers  ·  Tool Calling</text>
    <circle cx="822" cy="174" r="4" fill="#3da9fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>

    <!-- Layer 3 -->
    <rect x="24" y="224" width="812" height="72" rx="8" fill="#150e2a" stroke="#7c5cff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="42" y="248" font-size="11" font-weight="700" fill="#a98cff" font-family="'Courier New', monospace" letter-spacing="1">03 · MODELS &amp; INFERENCE</text>
    <text x="42" y="274" font-size="13" fill="#dcd4f5" font-family="'Helvetica Neue', Arial, sans-serif">Claude  ·  OpenAI GPT  ·  Gemini 2.5  ·  DeepSeek R1  ·  Groq  ·  Ollama (local)</text>
    <circle cx="822" cy="260" r="4" fill="#7c5cff"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>

    <!-- Layer 4 -->
    <rect x="24" y="310" width="812" height="66" rx="8" fill="#1f1308" stroke="#febc2e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="42" y="332" font-size="11" font-weight="700" fill="#febc2e" font-family="'Courier New', monospace" letter-spacing="1">04 · DATA, VECTORS &amp; STORAGE</text>
    <text x="42" y="356" font-size="13" fill="#f4ddc8" font-family="'Helvetica Neue', Arial, sans-serif">OpenSearch  ·  Oracle 26ai  ·  FAISS  ·  Pinecone  ·  PostgreSQL  ·  MongoDB  ·  Redis</text>
    <circle cx="822" cy="342" r="4" fill="#febc2e"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
  </g>
  <rect x="0.5" y="0.5" width="859" height="389" rx="12" fill="none" stroke="#1b2b35" stroke-width="1"/>
</svg>
