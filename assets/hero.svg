<svg width="860" height="310" viewBox="0 0 860 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="1" stop-color="#080e18"/>
    </linearGradient>
    <linearGradient id="bigGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffc8"/>
      <stop offset="0.5" stop-color="#3da9fc"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00ffc8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00ffc8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3da9fc" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3da9fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1a2535" opacity="0.6"/>
    </pattern>
    <clipPath id="reveal">
      <rect x="0" y="128" height="70" width="0">
        <animate attributeName="width" from="0" to="860" begin="0.3s" dur="2.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
    <clipPath id="reveal2">
      <rect x="0" y="204" height="40" width="0">
        <animate attributeName="width" from="0" to="860" begin="1.8s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
    <clipPath id="winClip"><rect width="860" height="310" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#winClip)">
    <rect width="860" height="310" fill="url(#bg)"/>
    <rect width="860" height="310" fill="url(#dots)"/>
    <ellipse cx="720" cy="60" rx="200" ry="160" fill="url(#glowA)"/>
    <ellipse cx="100" cy="270" rx="180" ry="140" fill="url(#glowB)"/>

    <!-- window bar -->
    <rect width="860" height="36" fill="#0b1520"/>
    <line x1="0" y1="36" x2="860" y2="36" stroke="#1b2b35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5.5" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="5.5" fill="#febc2e"/>
    <circle cx="60" cy="18" r="5.5" fill="#28c840"/>
    <text x="430" y="23" text-anchor="middle" font-size="12" fill="#3a4d59" font-family="'Courier New', monospace" letter-spacing="1">paras@systems — ai/ml engineer — bash</text>

    <!-- prompt lines -->
    <text x="30" y="74" font-size="13" fill="#00ffc8" font-family="'Courier New', monospace">paras@systems</text>
    <text x="155" y="74" font-size="13" fill="#5b7282" font-family="'Courier New', monospace">:~$</text>
    <text x="185" y="74" font-size="13" fill="#cfe3df" font-family="'Courier New', monospace">identify --full</text>
    <text x="30" y="96" font-size="13" fill="#5b7282" font-family="'Courier New', monospace">→ Paras Patel · building autonomous AI systems since 2022</text>

    <!-- BIG TAGLINE -->
    <g clip-path="url(#reveal)">
      <text x="30" y="175" font-size="54" font-weight="800" fill="url(#bigGrad)" font-family="'Helvetica Neue', Arial, sans-serif" letter-spacing="-1">REASON · RETRIEVE · ACT</text>
    </g>

    <!-- subline -->
    <g clip-path="url(#reveal2)">
      <text x="32" y="226" font-size="15.5" fill="#8fa3b3" font-family="'Helvetica Neue', Arial, sans-serif">Not another chatbot wrapper — real multi-agent systems, production-deployed.</text>
    </g>

    <!-- blinking cursor -->
    <rect x="342" y="57" width="10" height="20" fill="#00ffc8">
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.4;0.41;0.9;0.91;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- bottom filesystem line -->
    <text x="30" y="290" font-size="11.5" fill="#2a3d4d" font-family="'Courier New', monospace">drwxr-xr-x  agentic-ai/  multimodal-rag/  mcp-tools/  oracle-26ai/  prod-systems/</text>

    <!-- top right indicator -->
    <circle cx="836" cy="18" r="4" fill="#00ffc8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="816" y="22" font-size="9.5" fill="#00ffc8" font-family="'Courier New', monospace">LIVE</text>
  </g>
  <rect x="0.5" y="0.5" width="859" height="309" rx="12" fill="none" stroke="#1b2b35" stroke-width="1"/>
</svg>
